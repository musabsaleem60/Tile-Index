services:
  - type: web
    name: tile-index-api
    env: python
    rootDir: Tile Index/backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    autoDeploy: true
    envVars:
      - key: APP_NAME
        value: Tile Index API
      - key: APP_ENV
        value: production
      - key: APP_VERSION
        value: 1.0.0
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
      - key: BACKEND_CORS_ORIGINS
        value: ""
      - key: LATEST_DESKTOP_VERSION
        value: 1.0.0
      - key: LATEST_DESKTOP_DOWNLOAD_URL
        value: ""
      - key: LATEST_DESKTOP_RELEASE_NOTES
        value: Initial production backend
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
